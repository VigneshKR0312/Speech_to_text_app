<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Live Stream</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        width: min(92vw, 480px);
        padding: 24px;
        border-radius: 14px;
        background: #1e293b;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        text-align: center;
      }
      .button {
        border: none;
        border-radius: 999px;
        padding: 14px 22px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
      }
      .button.start {
        background: #16a34a;
      }
      .button.stop {
        background: #dc2626;
      }
      .status {
        margin-top: 12px;
        color: #93c5fd;
      }
      .error {
        margin-top: 12px;
        color: #fda4af;
      }
      .transcript {
        margin-top: 16px;
        text-align: left;
        padding: 12px;
        border-radius: 8px;
        background: #0b1220;
        min-height: 120px;
        max-height: 240px;
        overflow-y: auto;
        line-height: 1.4;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Live Mic Stream</h1>
      <p>Streams raw PCM audio directly to Deepgram backend WebSocket.</p>
      <button id="toggleBtn" class="button start">Start Live Stream</button>
      <p id="status" class="status">Idle</p>
      <p id="error" class="error"></p>
      <div id="transcript" class="transcript">Transcript will appear here...</div>
    </main>
    <script src="/client.js"></script>
  </body>
</html>
